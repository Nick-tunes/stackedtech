<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StackedTech — Gadgets. Ranked. Stacked.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan: #00e5ff;
    --dark: #090909;
    --mid: #111;
    --text: #e8e8e8;
    --muted: #666;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .hero {
    position: relative;
    text-align: center;
    z-index: 1;
    padding: 2rem;
  }
  .logo-stack {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 0 auto 2.5rem;
    width: fit-content;
  }
  .bar { height: 10px; border-radius: 3px; background: var(--cyan); }
  .bar:nth-child(1) { width: 220px; opacity: 1; }
  .bar:nth-child(2) { width: 165px; opacity: 0.65; }
  .bar:nth-child(3) { width: 110px; opacity: 0.4; }
  .bar:nth-child(4) { width: 55px; opacity: 0.2; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 1rem;
  }
  h1 span { color: var(--cyan); }
  .tagline {
    font-size: 1rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }
  .tiktok-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--mid);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 0.9rem;
    color: var(--cyan);
    text-decoration: none;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  footer {
    position: fixed;
    bottom: 1.5rem;
    display: flex;
    gap: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
    z-index: 1;
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--cyan); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="glow"></div>
<div class="hero">
  <div class="logo-stack">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
  <h1>Stacked<span>Tech</span></h1>
  <p class="tagline">Gadgets &middot; Ranked &middot; Stacked</p>
  <a class="tiktok-badge" href="https://tiktok.com/@stackedtech" target="_blank">
    <span class="dot"></span>
    Follow @StackedTech on TikTok
  </a>
</div>
<footer>
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Service</a>
</footer>
</body>
</html>
